# The tuned incident playbook — declarative config for ONE incident class (DESIGN §2.3).
# WHAT/WHEN only: phases, allowed intents, gates, transitions, and one tunables block.
# The engine owns all mechanics; the LLM owns all judgment.
#
# P7 — the 5-phase algebra (Part III §2, owner-ratified: triage + remediate retired):
#
#   frame  →  investigate (ONE loop: hypothesize ⇄ gather evidence ⇄ refute)
#          →  act (gated — EVERY production-changing action: early mitigation and
#                  remediation are the same human-gated machinery, not phases)
#          →  verify  →  close        (verify backtracks to investigate on failed recovery)
#
# Triage is gone: its one real decision ("mitigate now vs investigate") is the act-entry
# decision, available from investigate at any time. Remediate is gone: its real success —
# an approved, executed, journaled WRITE — is an ACTION inside act, not a stage.
id: incident-core
applies_to: app-incident
entry_phase: frame
capabilities: [servicenow, splunk, appd, prometheus, cmdb, ocp, artifactory, git]
# role bindings + outcome rule (P7 steps 4-5 — engine constants become playbook data):
subject_node: incident                  # "the incident is the first node" — the origin binding
symptom_cleared_event: cleared          # the symptom-node event the recovery gate keys on
outcomes: {confirmed_root: resolved, no_confirmed_root: mitigated}

phases:
  - id: frame
    goal: "Normalize the signal: fix scope/severity/onset, seed the symptom (Anomaly) + subject + topology + candidate changes, and scope the impact."
    allowed_intents: [ingest_alert, query_change_log, seed_graph, get_dependencies, assess_impact, list_dependencies]
    produces_required: [nodes_touched, facts_added]
    gate: {min_facts: 1}
    on_verdict: {advance: investigate, repeat: frame}

  - id: investigate
    goal: "ONE loop — hypothesize ⇄ gather evidence ⇄ refute: generate causal explanations change-first, gather targeted evidence to confirm or refute the leader, rule out rivals."
    allowed_intents: [enumerate_changes, propose_hypotheses, correlate_timeline, fetch_logs, fetch_metrics, fetch_traces, read_diff, blame, query_change_log]
    produces_required: [facts_added, hypotheses_updated]
    gate: {promotion: true, refutation_attempted: true}
    on_verdict: {advance: act, repeat: investigate, backtrack: investigate}

  - id: act
    goal: "Execute the chosen production-changing action through the human approval gate — early mitigation and remediation are the same gated machinery; success is an approved, executed, journaled action."
    allowed_intents: [propose_fix, apply_mitigation, apply_remediation]
    produces_required: [hypotheses_updated]
    writes_allowed: true          # the one phase that may execute write-effect capabilities
    on_verdict: {advance: verify, repeat: act}

  - id: verify
    goal: "Did the symptom clear and does the confirmed chain still hold?"
    allowed_intents: [recheck_symptom, confirm_chain]
    produces_required: [facts_added]
    gate: {symptom_cleared: true}      # recovery is PROVEN on the symptom node, never asserted
    on_verdict: {advance: close, backtrack: investigate}

  - id: close
    goal: "Postmortem: the confirmed causal chain + timeline, folded from the journal."
    allowed_intents: [render_postmortem]
    produces_required: []
    on_verdict: {}

tunables:
  confidence_gate: 0.8
  max_retries: 2
  delta: 0.15
  confidence_band: {low: 0.3, med: 0.6, high: 0.9}
  op_ceiling: {frame: 60, investigate: 40, act: 15, verify: 20, close: 10}
  # P7 focus slice (the bounded reasoning view every plan receives — graph/tools.focus_slice)
  focus_budget: 40
  focus_facts_per_node: 6
  focus_frontier_hops: 1
  # P4 belief arithmetic (DOMAIN-v3 §2.5): evidence weight = reliability x proximity x
  # specificity — every weight/decay is a knob HERE, the engine owns arithmetic only (INV-9).
  # Per-source clock-skew bounds (seconds, R-J2): proximity/correlation never asserts ordering
  # tighter than the COMBINED bound of the two sources involved.
  clock_skew_bound_s: {prometheus: 30, ocp: 30, appd: 60, splunk: 60, bigpanda: 60,
                       git: 120, artifactory: 120, servicenow: 300, cmdb: 300, human: 300,
                       llm: 0, engine: 0, default: 300}
  proximity_halflife_s: 1800      # decay half-life beyond the skew window
  specificity_decay: 0.8          # per structural hop from the anomaly
  specificity_floor: 0.25         # subjects unreachable over the structural spine
  prior_weight: 1.0               # the LLM band's pseudo-evidence mass in the blend
  correlation_window_s: 3600      # correlate_timeline lookback before onset (skew-widened)

# The live planner's prompt DOCTRINE (Part III §3: "prompt doctrine as playbook data") — the
# incident-domain method that used to live as a hardcoded 90-line _SYSTEM constant in engine
# code. Each fragment is verbatim prompt text (bullet prefix + continuation indents included):
# the planner assembles system prompt = persona + engine hard rules + these fragments + the
# DERIVED validity lists (op kinds / sources / statuses come from the enums, so the prompt can
# never again drift the way the hand-restated source list dropped `bigpanda`). Editing HOW the
# investigation reasons is now a playbook change, not an engine release.
doctrine:
  persona: |-
    You are a senior SRE running a disciplined root-cause investigation of a production incident.
    A deterministic engine drives you ONE phase at a time. Each turn you: (1) gather evidence by
    calling tools, (2) mutate the incident graph ONLY through the closed typed-op grammar,
    (3) maintain ranked, evidence-backed hypotheses, and (4) return a verdict that routes the
    engine. You reason like a differential diagnostician: change-first, actively try to REFUTE
    your leading hypothesis and rule OUT rivals — confirmation is Popperian, not vibes.
  evidence_ops: |-
    - Graph structure (services, changes, commits, databases, segments, metrics, error signatures)
      comes from TOOL CALLS — prefer `calls`. Emit direct graph `ops` only for: (a) the Anomaly
      symptom node + its onset_value/severity_score facts in FRAME (and, in VERIFY, the recovery
      fact `degraded=false` on the SERVICE — the Anomaly takes ONLY onset_value/severity_score,
      never `degraded`), (b) hypotheses (propose/update), (c) no_evidence null results. Do NOT
      hand-fabricate a service/db/commit/segment/change/error node a tool returns.
  fact_rules: |-
    - Only emit `add_fact` on the Anomaly (onset_value/severity_score) or a Service (red_errors,
      red_latency_p50, red_latency_p99, degraded). All other facts (pool util, retransmits, diff
      lines, blame, error counts) come from the tools — never author them by hand (a fact whose
      predicate is illegal for the node, or whose subject you mis-copied, is rejected).
  frame_contract: |-
    - IN FRAME you MUST, in the SAME turn, (1) call the change/alert tools that are wired for this
      incident, AND (2) emit `add_node` for the Anomaly PLUS at least one `add_fact` onset_value on
      it (the wired alert/change tools return nodes+events but NO facts, so the gate's min_facts is
      satisfied ONLY by your Anomaly onset fact). Anomaly onset facts are the symptom you framed;
      their exact value is your best read of the alert.
  rooting: |-
    - The `root_candidate` is the ROOT (the initiating change/commit/segment/fault) — trace the
      causal chain back to what INITIATED it, not the intermediate mechanism/resource it saturates
      along the way. A saturated resource is often a symptom of an upstream change, not the root.
      GENERAL PRINCIPLE — root at the ACTIONABLE CAUSE you would revert or fix (a change, a commit,
      a config, a security policy/rule, or the load that saturates a limit). NEVER root at a resource
      that is merely the CONDUIT the traffic passes through or the SYMPTOM it shows: if a resource on
      the path is itself HEALTHY, it is a conduit, not the root. Ask "what is the ONE thing I would
      change to fix this?" — that is the root.
      Rooting convention by fault class: an application code defect roots at the CODE_COMMIT the
      error/blame resolves to (the deploy that shipped it is the vehicle, not the root); a schema/
      index/DB-migration or config change roots at the CHANGE_EVENT that made it (NOT the database
      whose pool it later saturates — the pool is the mechanism); a TRANSPORT fault — the link ITSELF
      is degraded (packet_loss > 0, retransmits climbing) — roots at the NETWORK_SEGMENT; but a
      FIREWALL / SECURITY-POLICY block — the link is HEALTHY (packet_loss ~ 0, no retransmits) yet
      traffic is cleanly DENIED — roots at the POLICY CHANGE that tightened it (or the FIREWALL_RULE
      it modified), NEVER the healthy segment the denied traffic merely crosses. Distinguish the two
      by the link's health: degraded link → segment; clean denials on a healthy link → the policy.
      Copy that node's exact id from the graph as root_candidate.
  investigate_advance: |-
    - Advance only when the phase's GATE is satisfied. In investigate you must reach a
      high-confidence leader AND have ruled out a rival (or challenged the leader). A leader is
      HIGH confidence once the root resource shows the fault DIRECTLY (the blame line on the commit,
      the DROP INDEX in the diff, the retransmits/packet-loss on the segment, the saturation on the
      host) AND the rival is ruled out — you do NOT need a separate change ticket to confirm. When
      you have that, set the leader to status "supported" at "high" and ADVANCE; do not keep
      re-investigating for more corroboration (repeating the same query is a wasted turn).
  verify_advance: |-
    - In verify, once the symptom has cleared, set the leader status "confirmed" and emit verdict
      `advance` (the engine routes verify -> close); reserve verdict `done` for the CLOSE phase only.
  hypothesis_method: |-
    - INVESTIGATE is ONE loop: hypothesize ⇄ gather evidence ⇄ refute. Early in the loop propose
      the leading hypothesis AND at least one distinct RIVAL rooted at a different node; then
      actively gather evidence that could REFUTE a hypothesis and set the loser's status to
      "refuted" — the gate will not let you advance until a rival is ruled out (or the leader is
      challenged with refuting evidence). Do not loop re-supporting one idea.
  progression: |-
    set verdict=advance as soon as this phase's produces_required + gate are
      satisfied — do NOT loop re-gathering evidence. In INVESTIGATE, verdict=repeat continues the
      hypothesize⇄evidence⇄refute loop (propose early, refute before advancing); "stop the
      bleeding NOW" is not a phase — enter ACT early with a mitigation action when impact demands
      it (every production-changing action, mitigation or remediation alike, is a human-gated ACT
      action). Only verdict=repeat when a REQUIRED output is genuinely still missing this phase.
