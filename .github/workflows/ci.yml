name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q          # unit + end-to-end scenarios (fully mocked, no creds/network)
      - run: ruff check

  workbench:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build       # tsc --noEmit && vite build
      - run: npm test
