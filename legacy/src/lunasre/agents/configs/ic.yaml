# Incident Commander (IC) agent — declarative config.
#
# This file IS the agent: changing model / tools / runtime here changes IC's behaviour
# without touching ic.py. See ARCHITECTURE.md §5 ("Config-driven agents") for the contract.
#
# Phase 2 will add: delegation.by_alert_type, memory.provider/url.
# Phase 4 will add: observability.otlp, identity.oauth, runtime.checkpointer.

agent_id: ic-agent
role: incident-commander
description: |
  Incident Commander — supervisor agent.
  Investigates a synthetic SRE alert end-to-end by calling MCP tools discovered at
  runtime from the MCP registry. Phase 2 adds A2A delegation to DBOps/NetOps/DeployOps
  specialists by alert type.

llm:
  # Talk to the model via the LiteLLM proxy — never directly to a vendor SDK.
  # This is the L1 portability layer: swap the model line below; agent code unchanged.
  base_url: http://localhost:4000
  api_key: sk-luna-local-dev      # local-dev master key for the proxy (not a vendor secret)
  model: ollama-mistral           # Chunk 2: Mistral ministral-3:8b (stronger OpenAI-tool-format discipline than qwen2.5)
  # Switch this single line when XAI_API_KEY is sourced (Grok is the design target):
  #   model: grok-3
  temperature: 0.0                # deterministic for tool-calling discipline

registries:
  # Paths are relative to the project root (the dir holding pyproject.toml).
  mcp:   infra/registries/mcp_registry.yaml
  agent: infra/registries/agent_registry.yaml

tools:
  # Chunk 2 — explicit server pick for simplicity. Only mock_datadog has a real
  # server file yet; mock_logs / mock_traces / mock_pg are seeded in the registry
  # but their server modules land in Phase 2.
  use_servers: [mock_datadog]
  # Phase 2 will replace the above with capability-based discovery:
  # use_capabilities: [alert-drill, log-tail, log-search, trace-fetch, metric-query]

runtime:
  graph: one_node_investigate     # the only graph shape this agent runs in Chunk 2
  max_tool_iterations: 4          # safety cap on tool-call → tool-result → model loops

# Phase 2 — A2A delegation map. When IC's drill_into_alert returns an alert
# whose `type` field matches a key here, IC consults the agent_registry to
# resolve the agent-id, fetches its Agent Card, and POSTs a delegation message
# to its /a2a/message endpoint. The peer's findings are appended to IC's
# conversation and IC then composes a final summary that includes them.
delegation:
  by_alert_type:
    db-failure: dbops-agent
    network-partition: netops-agent
    deploy-regression: deployops-agent
