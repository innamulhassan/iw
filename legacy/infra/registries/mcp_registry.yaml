# MCP server registry — runtime discovery for Phase 1 (file-based) and Phase 4 (MCP Gateway swap).
# Read by lunasre.registries.mcp_registry.load_mcp_registry().

servers:

  mock_datadog:
    description: Mock Datadog-style alert + log tool source (Chunk 1)
    transport: stdio
    command: [uv, run, python, -m, lunasre.mcp_servers.mock_datadog.server]
    capabilities: [alert-drill, log-tail]

  mock_logs:
    description: Stateful log search — open_log_session / grep / tail / close (Phase 2)
    transport: stdio
    command: [uv, run, python, -m, lunasre.mcp_servers.mock_logs.server]
    capabilities: [log-search, log-tail]
    supports_sessions: true  # MCP stateful-sessions depth demo

  mock_traces:
    description: Mock distributed traces (Phase 2)
    transport: stdio
    command: [uv, run, python, -m, lunasre.mcp_servers.mock_traces.server]
    capabilities: [trace-fetch, span-search]

  mock_pg:
    description: Mock Postgres metrics + connection-pool inspector (Phase 2)
    transport: stdio
    command: [uv, run, python, -m, lunasre.mcp_servers.mock_pg.server]
    capabilities: [metric-query, connection-pool-status]
