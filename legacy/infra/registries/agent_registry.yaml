# A2A agent registry — 7 A2A agents.
# Router is graph-first (Phase 4) — NOT registered here (no Agent Card; not an A2A peer).
# Read by lunasre.registries.agent_registry.load_agent_registry().

agents:

  ic-agent:
    description: Incident Commander — supervisor; delegates by alert type via A2A; escalates to RCA
    card_url: http://localhost:8001/.well-known/agent.json
    capabilities: [incident-coordination, tool-orchestration]

  rca-agent:
    description: Root-cause analysis — Gemini long-context log + trace analysis
    card_url: http://localhost:8002/.well-known/agent.json
    capabilities: [root-cause-analysis, long-context-log-analysis]

  dbops-agent:
    description: Database operations specialist — Phase 2
    card_url: http://localhost:8003/.well-known/agent.json
    capabilities: [db-incident, db-failover]
    triggers_on: db-failure

  netops-agent:
    description: Network operations specialist — Phase 2
    card_url: http://localhost:8004/.well-known/agent.json
    capabilities: [network-incident, traffic-reroute]
    triggers_on: network-partition

  deployops-agent:
    description: Deployment operations specialist — Phase 2
    card_url: http://localhost:8005/.well-known/agent.json
    capabilities: [deploy-incident, rollback]
    triggers_on: deploy-regression

  pm-writer:
    description: Postmortem writer — Gemini-authored (Phase 3)
    card_url: http://localhost:8006/.well-known/agent.json
    capabilities: [postmortem-authoring]

  grok-reviewer:
    description: Adversarial postmortem reviewer — xAI Grok critic (Phase 3)
    card_url: http://localhost:8007/.well-known/agent.json
    capabilities: [postmortem-review, adversarial-critique]
