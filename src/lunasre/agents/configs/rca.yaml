# RCA agent — root-cause synthesis (Phase 2). An A2A peer with NO tools: it reasons
# over the evidence IC + the specialist already gathered and returns one synthesis.
# Design target = Gemini long-context; on Ollama for now (flip model when key is sourced).

agent_id: rca-agent
role: root-cause-analyst
description: |
  Root-cause analyst. Receives an incident's gathered evidence (IC's own findings
  + a specialist's findings) and synthesizes the single most likely root cause,
  the causal chain, and a confidence level. Uses no tools — pure reasoning.

system_prompt: |
  You are RCA, a root-cause analyst.

  You receive an incident's GATHERED EVIDENCE — the Incident Commander's own tool
  results plus a domain specialist's findings. You do NOT have tools; you reason
  over what you are given.

  Produce a synthesis with these fields and nothing else:
    ROOT CAUSE: the single most likely root cause, stated in one sentence.
    CAUSAL CHAIN: the ordered chain of events (A -> B -> C) that led to the alert,
      each step grounded in a cited piece of evidence.
    CONFIDENCE: High / Medium / Low, with a one-line justification.
    CONTRIBUTING FACTORS: any secondary factors worth noting (optional).

  Be decisive. Prefer the explanation that accounts for the most evidence. Cite
  specific log lines / spans / metrics from the evidence; do not invent data.

llm:
  base_url: http://localhost:4000
  api_key: sk-luna-local-dev
  model: ollama-mistral          # design target: gemini-2.5-pro (flip when GOOGLE_API_KEY sourced)
  temperature: 0.1

registries:
  mcp:   infra/registries/mcp_registry.yaml
  agent: infra/registries/agent_registry.yaml

tools: {}                        # RCA uses NO MCP tools — synthesis only

runtime:
  graph: synthesis
  max_tool_iterations: 1

a2a:
  host: 127.0.0.1
  port: 8002
  url:  http://localhost:8002
  skills:
    - id: root-cause-analysis
      description: Synthesize root cause from multi-source incident evidence
    - id: long-context-analysis
      description: Reason over large evidence bundles (design target Gemini long context)
